<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Our Private Room</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-phone" viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.91.33 1.8.62 2.65a2 2 0 0 1-.45 2.11L8 9.76a16 16 0 0 0 6.24 6.24l1.28-1.28a2 2 0 0 1 2.11-.45c.85.29 1.74.5 2.65.62A2 2 0 0 1 22 16.92Z" />
      </symbol>
      <symbol id="icon-video" viewBox="0 0 24 24">
        <path d="M15 10.5V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3.5l6 4v-11l-6 4Z" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m20 6-11 11-5-5" />
      </symbol>
      <symbol id="icon-mic" viewBox="0 0 24 24">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <path d="M12 19v3" />
      </symbol>
      <symbol id="icon-camera" viewBox="0 0 24 24">
        <path d="M14.5 4 17 7h3a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3l2.5-3h5Z" />
        <circle cx="12" cy="13" r="3" />
      </symbol>
      <symbol id="icon-end" viewBox="0 0 24 24">
        <path d="M4 14.5c5.33-3.33 10.67-3.33 16 0l-2.2 3.8a2 2 0 0 1-2.62.8l-1.45-.7a4 4 0 0 0-3.46 0l-1.45.7a2 2 0 0 1-2.62-.8L4 14.5Z" />
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 9 9 0 1 0 20.5 14.5Z" />
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </symbol>
    
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="m22 2-7 20-4-9-9-4 20-7Z" />
        <path d="M22 2 11 13" />
      </symbol>
      <symbol id="icon-lock" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </symbol>
    </svg>
    <main class="app-shell">
      <section class="login-panel" id="loginPanel">
        <div>
          <p class="eyebrow">Private space</p>
          <h1>Our Room</h1>
          <p class="subtle">Temporary chat, private calls, and no saved message history.</p>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            Your name
            <input id="nameInput" autocomplete="nickname" maxlength="24" placeholder="Enter Your Name" required />
          </label>
          <label>
            Room code
            <input id="roomInput" maxlength="48" placeholder="Enter Code" required />
          </label>
          <label>
            Secret password
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Enter secret password" required />
          </label>
          <button type="submit" class="primary-action">
            <svg class="icon"><use href="#icon-lock"></use></svg>
            <span>Enter room</span>
          </button>
          <p class="error" id="loginError" role="alert"></p>
        </form>
      </section>

      <section class="room hidden" id="roomPanel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Encrypted in transit</p>
            <h1>Our Room</h1>
          </div>
          <div class="presence">
            <span id="statusDot" class="status-dot"></span>
            <span id="statusText">Offline</span>
          </div>
        </header>

        <section class="call-stage" id="callStage">
          <div class="video-layout" id="videoLayout">
            <button type="button" class="video-pane remote-pane featured" id="remotePane" title="Show partner in small frame" aria-label="Show partner in small frame">
              <video id="remoteVideo" autoplay playsinline></video>
              <span class="video-label">Partner</span>
            </button>
            <button type="button" class="video-pane local-pane" id="localPane" title="Show your camera in big frame" aria-label="Show your camera in big frame">
              <video id="localVideo" autoplay muted playsinline></video>
              <span class="video-label">You</span>
            </button>
          </div>
          <div class="call-info">
            <p id="callStatus" class="call-status">Ready for private voice or video.</p>
            <time id="callTimer" class="call-timer hidden" datetime="PT0S">00:00</time>
          </div>
          <div class="call-actions">
            <button id="voiceButton" class="icon-button" title="Start voice call" aria-label="Start voice call">
              <svg class="icon"><use href="#icon-phone"></use></svg>
            </button>
            <button id="videoButton" class="icon-button" title="Start video call" aria-label="Start video call">
              <svg class="icon"><use href="#icon-video"></use></svg>
            </button>
            <button id="acceptCallButton" class="icon-button accept hidden" title="Accept incoming call" aria-label="Accept incoming call">
              <svg class="icon"><use href="#icon-check"></use></svg>
            </button>
            <button id="muteButton" class="icon-button" title="Mute microphone" aria-label="Mute microphone">
              <svg class="icon"><use href="#icon-mic"></use></svg>
            </button>
            <button id="cameraButton" class="icon-button" title="Toggle camera" aria-label="Toggle camera">
              <svg class="icon"><use href="#icon-camera"></use></svg>
            </button>
            <button id="endCallButton" class="icon-button danger" title="End call" aria-label="End call">
              <svg class="icon"><use href="#icon-end"></use></svg>
            </button>
          </div>
        </section>

        <section class="workspace">
          <div class="chat-panel">
            <div class="messages" id="messages"></div>
            <p class="typing" id="typing"></p>
            <form id="messageForm" class="composer">
              <select id="timerSelect" title="Self destruct timer">
                <option value="0">Keep</option>
                <option value="5">5 sec</option>
                <option value="30">30 sec</option>
                <option value="60">1 min</option>
              </select>
              <input id="messageInput" autocomplete="off" placeholder="Type a message..." maxlength="2000" />
              <button type="submit" class="send-button" title="Send message" aria-label="Send message">
                <svg class="icon"><use href="#icon-send"></use></svg>
              </button>
            </form>
          </div>

          <aside class="side-panel">
            <p class="panel-title">Theme</p>
            <div class="theme-row">
              <button class="theme-button active" data-theme="dark" title="Dark mode" aria-label="Dark mode">
                <svg class="icon"><use href="#icon-moon"></use></svg>
                <span>Dark</span>
              </button>
              <button class="theme-button" data-theme="light" title="Light mode" aria-label="Light mode">
                <svg class="icon"><use href="#icon-sun"></use></svg>
                <span>Light</span>
              </button>
            </div>
            <label class="note-label">
              Shared temporary note
              <textarea id="noteInput" placeholder="Movie Saturday 8PM"></textarea>
            </label>
            <p class="privacy-note">Messages are only forwarded live. Refresh, logout, or server restart removes them.</p>
          </aside>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
